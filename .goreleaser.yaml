version: 2

project_name: openminutes

builds:
  - id: openminutes
    main: ./main.go
    binary: openminutes
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - "386"
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    ldflags:
      - -s -w -X openminutes/cmd.version={{ .Tag }} -X openminutes/cmd.commit={{ .FullCommit }}

archives:
  - id: openminutes
    ids:
      - openminutes
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  use: git

release:
  footer: |
    ## Installation

    ```sh
    npm install @openminutes/cli
    ```
